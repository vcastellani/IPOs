name: Monthly EDGAR EFFECT Scraper

on:
  schedule:
    # 9:30 AM Eastern (13:30 UTC) on the 1st of each month
    - cron: '30 13 1 * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Single date override (YYYY-MM-DD).'
        required: false
        default: ''
      start_date:
        description: 'Range start (YYYY-MM-DD). Leave blank to use previous full month.'
        required: false
        default: ''
      end_date:
        description: 'Range end (YYYY-MM-DD). Leave blank to use previous full month.'
        required: false
        default: ''

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute previous month date range
        if: github.event_name == 'schedule' || (github.event.inputs.start_date == '' && github.event.inputs.end_date == '' && github.event.inputs.date == '')
        run: |
          echo "EDGAR_START_DATE=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m-%d)" >> $GITHUB_ENV
          echo "EDGAR_END_DATE=$(date -d "$(date +%Y-%m-01) -1 day" +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run EDGAR scraper
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:    ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          EDGAR_DATE:       ${{ github.event.inputs.date }}
          EDGAR_START_DATE: ${{ github.event.inputs.start_date || env.EDGAR_START_DATE }}
          EDGAR_END_DATE:   ${{ github.event.inputs.end_date || env.EDGAR_END_DATE }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python edgar_scraper.py
